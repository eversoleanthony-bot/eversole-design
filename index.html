<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eversole Design Co.</title>
<meta name="description" content="Anthony Eversole's design portfolio. New site under construction.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{ --ink:#181410; --paper:#efe9dd; --gold:#d99a3a; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--ink); color:var(--paper);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:2rem;
  }
  main{ max-width:32rem; }
  .wordmark{ font-weight:800; font-size:1.15rem; letter-spacing:.02em; margin-bottom:2.4rem; }
  h1{ font-weight:700; font-size:clamp(1.7rem,5vw,2.6rem); line-height:1.15; margin:0 0 1rem; letter-spacing:-.01em; }
  p{ font-size:1rem; line-height:1.6; color:rgba(239,233,221,.72); margin:0 0 2rem; }
  .contact{ font-size:.85rem; letter-spacing:.03em; text-transform:uppercase; }
  .contact a{ color:var(--gold); text-decoration:none; }
  .contact a:hover{ text-decoration:underline; }
  .contact span{ color:rgba(239,233,221,.4); margin:0 .6rem; }
</style>
</head>
<body>
<main>
  <div class="wordmark">Eversole Design Co.</div>
  <h1>New site under construction.</h1>
  <p>The portfolio is being rebuilt from the ground up. Back soon with the full thing.</p>
  <div class="contact">
    <a href="mailto:eversole.anthony@gmail.com">eversole.anthony@gmail.com</a>
    <span>&#183;</span>
    <a href="https://instagram.com/eversole_design">Instagram</a>
  </div>
</main>
</body>
</html>
